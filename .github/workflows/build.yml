name: Build

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  windows-msys2:
    name: Windows MSYS2 UCRT64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-glfw
            mingw-w64-ucrt-x86_64-vulkan-headers
            mingw-w64-ucrt-x86_64-vulkan-loader

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Configure
        shell: msys2 {0}
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: msys2 {0}
        run: cmake --build build --config Release

      - name: Generate sample proxy
        shell: msys2 {0}
        run: ./build/WsdlCppGenCli.exe --wsdl samples/AddService.wsdl --out generated-ci

      - name: Compile generated WinHTTP proxy
        shell: msys2 {0}
        run: g++ -std=c++26 -Igenerated-ci -c generated-ci/AddServiceClient.cpp -o build/AddServiceClient.o

      - name: Test Go AddService
        working-directory: service/addservice-go
        run: go test ./...

  ubuntu:
    name: Ubuntu
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc-14 g++-14 libglfw3-dev libvulkan-dev libcurl4-openssl-dev zenity

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_CXX_COMPILER=g++-14

      - name: Build
        run: cmake --build build --config Release

      - name: Generate sample proxy
        run: ./build/WsdlCppGenCli --wsdl samples/AddService.wsdl --out generated-ci

      - name: Compile generated libcurl proxy
        run: g++-14 -std=c++26 -DWSDLCPPGEN_USE_LIBCURL -Igenerated-ci -c generated-ci/AddServiceClient.cpp -o build/AddServiceClient.o

      - name: Test Go AddService
        working-directory: service/addservice-go
        run: go test ./...

  macos:
    name: macOS
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake ninja glfw vulkan-tools curl llvm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER="$(brew --prefix llvm)/bin/clang" \
            -DCMAKE_CXX_COMPILER="$(brew --prefix llvm)/bin/clang++"

      - name: Build
        run: cmake --build build --config Release

      - name: Generate sample proxy
        run: ./build/WsdlCppGenCli --wsdl samples/AddService.wsdl --out generated-ci

      - name: Compile generated libcurl proxy
        run: |
          "$(brew --prefix llvm)/bin/clang++" -std=c++26 \
            -DWSDLCPPGEN_USE_LIBCURL \
            -Igenerated-ci \
            -I"$(brew --prefix curl)/include" \
            -c generated-ci/AddServiceClient.cpp \
            -o build/AddServiceClient.o

      - name: Test Go AddService
        working-directory: service/addservice-go
        run: go test ./...
